function render(){var a=document.getElementById('app'),bk=document.getElementById('bkB'),tt=document.getElementById('tT'),ph=document.getElementById('phB');bk.classList.toggle('hd',S.p==='intro');ph.classList.toggle('hd',S.p==='intro'||S.p==='goals');

function rI(){return '<div class="fi"><div class="ih"><h1>SHARP</h1><div class="su">6 semaines · affûtage</div><div class="tg">RECOMP HAUT DU CORPS · SÈCHE · 10KM</div></div>'+

'<div class="is"><h3>◆ FOCUS</h3><div class="ag"><div class="ai2">PECS</div><div class="ai2">ÉPAULES</div><div class="ai2">DOS</div><div class="ai2">BRAS</div><div class="ai2">ABDOS</div><div class="ai2">EXPLO</div><div class="ai2">GRIP</div><div class="ai2">10KM</div><div class="ai2">UNILAT.</div></div></div>'+

'<button class="sb" onclick="nav(\'weeks\')">PROGRAMME →</button>'+
'<button class="sb alt" onclick="nav(\'goals\')">OBJECTIFS →</button></div>'}

function rG(){var h='<div class="fi">';GOALS.forEach(function(g){h+='<div class="stt">'+g.cat+'</div><table class="otb"><tr><th>CIBLE</th><th>VALEUR</th></tr>';g.it.forEach(function(i){h+='<tr><td>'+i.t+'</td><td><b>'+i.c+'</b>'+(i.s?'<br><span style="color:var(--w);font-size:10px">'+i.s+'</span>':'')+'</td></tr>'});h+='</table>'});h+='<button class="sb" style="margin-top:16px" onclick="nav(\'weeks\')">PROGRAMME →</button></div>';return h}

function rWk(){var h='<div class="fi"><div class="stt">6 SEMAINES</div><div class="wg">';for(var w=1;w<=6;w++){var c=w===5?'pk':w===6?'tp':'';h+='<div class="wc '+c+'" onclick="nav(\'days\',{w:'+w+'})"><div class="wn">S'+w+'</div><div class="wl">'+PH[w]+'</div></div>'}return h+'</div></div>'}

function rDs(){var h='<div class="fi">';if(BF[S.w])h+='<div class="br"><h3>◆ BRIEFING S'+S.w+'</h3><p>'+BF[S.w]+'</p></div>';h+='<div class="stt">SÉANCES</div><div class="dg">';for(var d=1;d<=7;d++){var D=DAYS.find(function(x){return x.day===d}),dn=gDn(S.w,d),du=D&&D.dur[S.w-1]!=='—'?D.dur[S.w-1]+'min':'';var cls=D.type==='run'?'run':D.type==='rest'?'rest':'';h+='<div class="dc '+cls+'" onclick="nav(\'day\',{w:'+S.w+',d:'+d+'})"><div class="dn">'+DN[d]+'</div><div class="dd">'+du+'</div>'+(dn?'<div class="dk">✓</div>':'')+'</div>'}return h+'</div></div>'}

function rD(){var D=DAYS.find(function(x){return x.day===S.d});if(!D)return'';var w=S.w,h='<div class="fi">';
if(BF[w]&&(S.d===1))h+='<div class="br"><h3>◆ BRIEFING S'+w+'</h3><p>'+BF[w]+'</p></div>';
if(D.wu&&WU[D.wu]){var Wu=WU[D.wu];h+='<div class="wu"><div class="wuh" onclick="tWu()"><span>'+Wu.nm+'</span><span class="wut">'+Wu.dur+'</span></div><div class="wub'+(S.oWu?' op':'')+'" id="wuBody">';Wu.ex.forEach(function(e){h+='<div class="we"><div class="wei"><div class="wen">'+e.n+'</div><div class="wed">'+e.d+'</div></div><div class="wev">'+e.v+'</div></div>'});h+='</div></div>'}
D.ex.forEach(function(ex,ei){var wk=ex.weeks[w];if(!wk||wk.rx==='—')return;

var id='e'+ei,op=S.oEx===id;
h+='<div class="ec"><div class="eh '+ex.tag+'" onclick="tEx(\''+id+'\')"><span class="en">'+ex.n+'</span>';
if(ex.rest)h+='<span class="et">'+ex.rest+'</span>';
h+='<span class="et'+(ex.tag==='pillar'?' pl':'')+'">'+tl+'</span>';
if(ex.yt)h+='<a href="'+ex.yt+'" target="_blank" class="ey" onclick="event.stopPropagation()">▶</a>';
h+='</div><div class="eb'+(op?' op':'')+'" id="'+id+'">';
h+='<div class="em">';if(ex.tempo)h+='<span class="tp2">TEMPO '+ex.tempo+'</span>';if(ex.rest)h+='<span>REPOS '+ex.rest+'</span>';h+='</div>';
if(ex.howto)h+='<div class="ht">'+ex.howto+'</div>';
if(ex.cue)h+='<div class="cu">'+ex.cue+'</div>';
h+='<div class="rx2"><div class="lb">S'+w+' · '+PH[w]+'</div><div class="rv">'+wk.rx+'</div>'+(wk.note?'<div class="nt">'+wk.note+'</div>':'')+'</div>';
if(wk.sg)h+='<div class="sg2">⚠ '+wk.sg+'</div>';
if(w>1&&ex.sets>0&&!ex.parts){var pc=gL(w-1,S.d,ei,0,'kg');if(pc)h+='<div class="pd"><strong>S'+(w-1)+' set 1 :</strong> '+pc+'kg</div>'}
if(ex.sets>0){var ns=parseInt((wk.rx.match(/(\d+)×/)||[])[1])||ex.sets;
 if(ex.parts){
  ex.parts.forEach(function(pn,pi){
   var ppc=w>1?gL(w-1,S.d,ei,0,'kg'+pi):'';
   h+='<div class="sl"><div class="sl-t">▸ '+pn+'</div>';
   if(ppc)h+='<div class="pd" style="margin:0 0 6px"><strong>S'+(w-1)+' set 1 :</strong> '+ppc+'kg</div>';
   for(var si=0;si<ns;si++){var ck=gL(w,S.d,ei,si,'kg'+pi),cr=gL(w,S.d,ei,si,'rp'+pi);h+='<div class="sr"><div class="sn2">'+(si+1)+'</div><div class="si"><input type="number" step="0.5" placeholder="kg" value="'+ck+'" onchange="sL('+w+','+S.d+','+ei+','+si+',\'kg'+pi+'\',this.value)"><span class="u">kg</span></div><div class="si"><input type="number" placeholder="reps" value="'+cr+'" onchange="sL('+w+','+S.d+','+ei+','+si+',\'rp'+pi+'\',this.value)"><span class="u">rep</span></div></div>'}
   h+='</div>'});
 }else{
  h+='<div class="sl"><div class="sl-t">LOG PAR SÉRIE</div>';for(var si=0;si<ns;si++){var ck=gL(w,S.d,ei,si,'kg'),cr=gL(w,S.d,ei,si,'rp');h+='<div class="sr"><div class="sn2">'+(si+1)+'</div><div class="si"><input type="number" step="0.5" placeholder="kg" value="'+ck+'" onchange="sL('+w+','+S.d+','+ei+','+si+',\'kg\',this.value)"><span class="u">kg</span></div><div class="si"><input type="number" placeholder="reps" value="'+cr+'" onchange="sL('+w+','+S.d+','+ei+','+si+',\'rp\',this.value)"><span class="u">rep</span></div></div>'}h+='</div>';
 }
}
var cn=gN(w,S.d,ei);h+='<textarea class="ln" placeholder="Notes (score WOD, ressenti, allures, mesures sauts...)" onchange="sN('+w+','+S.d+','+ei+',this.value)">'+cn+'</textarea>';
h+='</div></div>'});
h+='<button class="cb" onclick="sDn('+w+','+S.d+');alert(\'S'+w+' '+DN[S.d]+' ✓\');nav(\'days\',{w:'+w+'})">✓ SÉANCE TERMINÉE</button>';
h+='<button class="cb exp" onclick="exportSession('+w+','+S.d+')">↗ EXPORTER POUR ANALYSE</button>';
return h+'</div>'}

function exportSession(w,d){var D=DAYS.find(function(x){return x.day===d});if(!D)return;var dt=new Date();var dateStr=dt.toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
var r='━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n◆ RAPPORT — SHARP\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n'+dateStr+'\nSemaine '+w+'/6 · '+DN[d]+' · '+D.nm+'\nPhase : '+PH[w]+'\n\n──── EXERCICES ────\n\n';
var totalS=0,doneS=0;
D.ex.forEach(function(ex,ei){var wk=ex.weeks[w];if(!wk||wk.rx==='—')return;
r+='▸ '+ex.n+(ex.tag==='pillar'?' ⭐':'')+'\n';
if(ex.tempo)r+='  Tempo '+ex.tempo+(ex.rest?' · Repos '+ex.rest:'')+'\n';
r+='  Prescription : '+wk.rx+'\n';
if(ex.sets>0){var ns=parseInt((wk.rx.match(/(\d+)×/)||[])[1])||ex.sets;
 if(ex.parts){
  ex.parts.forEach(function(pn,pi){
   r+='  ▸ '+pn+'\n';var charges=[],reps=[];
   for(var si=0;si<ns;si++){var ck=gL(w,d,ei,si,'kg'+pi),cr=gL(w,d,ei,si,'rp'+pi);totalS++;if(ck||cr){doneS++;r+='    S'+(si+1)+': '+(cr?cr+'r':'?')+' × '+(ck?ck+'kg':'?')+'\n';if(ck)charges.push(parseFloat(ck));if(cr)reps.push(parseInt(cr))}else{r+='    S'+(si+1)+': ⬜\n'}}
   if(charges.length){var avg=(charges.reduce(function(a,b){return a+b},0)/charges.length).toFixed(1);r+='    Moy : '+avg+'kg';if(reps.length)r+=' · Reps '+reps.join('-');r+='\n'}
  });
 }else{
  var charges=[],reps=[];for(var si=0;si<ns;si++){var ck=gL(w,d,ei,si,'kg'),cr=gL(w,d,ei,si,'rp');totalS++;if(ck||cr){doneS++;r+='  S'+(si+1)+': '+(cr?cr+'r':'?')+' × '+(ck?ck+'kg':'?')+'\n';if(ck)charges.push(parseFloat(ck));if(cr)reps.push(parseInt(cr))}else{r+='  S'+(si+1)+': ⬜\n'}}if(charges.length){var avg=(charges.reduce(function(a,b){return a+b},0)/charges.length).toFixed(1);r+='  Charge moy : '+avg+'kg';var pc=w>1?gL(w-1,d,ei,0,'kg'):'';if(pc){var diff=(charges[0]-parseFloat(pc)).toFixed(1);r+=' (S'+(w-1)+' set1 : '+pc+'kg '+(diff>0?'▲+'+diff:diff<0?'▼'+diff:'=')+')'}r+='\n';if(reps.length)r+='  Reps : '+reps.join('-')+'\n'}
 }
}
var cn=gN(w,d,ei);if(cn)r+='  📝 '+cn+'\n';r+='\n'});
r+='──── STATS ────\n\n';if(totalS>0)r+='Séries loguées : '+doneS+'/'+totalS+' ('+Math.round(doneS/totalS*100)+'%)\n\n';
r+='━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nColle dans Claude : "Analyse ma séance"\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
if(navigator.share){navigator.share({title:'SHARP S'+w+' '+DN[d],text:r}).catch(function(){cpExp(r)})}else{cpExp(r)}}
function cpExp(r){if(navigator.clipboard){navigator.clipboard.writeText(r).then(function(){alert('Rapport copié ! Colle-le dans Claude.')}).catch(function(){fbCp(r)})}else{fbCp(r)}}
function fbCp(r){var t=document.createElement('textarea');t.value=r;t.style.position='fixed';t.style.left='-9999px';document.body.appendChild(t);t.select();try{document.execCommand('copy');alert('Copié !')}catch(e){prompt('Copie manuelle :',r)}document.body.removeChild(t)}

render();
